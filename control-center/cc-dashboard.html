<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FadeJunkie — Control Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
--bg:#f5f5f3;--bg-card:#ffffff;--bg-hover:#ededeb;--bg-subtle:#fafaf9;
--bg-inset:#f0f0ee;--border:#e2e2e0;--border-2:#d0d0ce;
--text-1:#0f0f0e;--text-2:#555553;--text-3:#8a8a87;
--red:#dc2626;--red-soft:rgba(220,38,38,0.07);
--amber:#d97706;--amber-soft:rgba(217,119,6,0.07);
--green:#16a34a;--green-soft:rgba(22,163,74,0.07);
--blue:#2563eb;--blue-soft:rgba(37,99,235,0.07);
--violet:#7c3aed;--violet-soft:rgba(124,58,237,0.07);
--cyan:#0891b2;--cyan-soft:rgba(8,145,178,0.07);
--funkie:#d97706;--lobe:#7c3aed;--seo:#0891b2;
--font-sans:-apple-system,'SF Pro Display','Inter','Segoe UI',sans-serif;
--font-mono:'Geist Mono','SF Mono','Fira Code',monospace;
--ease:cubic-bezier(0.4,0,0.2,1);
--spring:cubic-bezier(0.34,1.56,0.64,1);
--radius:10px;--radius-lg:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);font-size:14px;color:var(--text-1);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased;}
#root{min-height:100vh;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes sheet-in{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes fade-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toast-progress{from{width:100%}to{width:0%}}
@keyframes glow{0%,100%{box-shadow:0 0 4px rgba(22,163,74,.4)}50%{box-shadow:0 0 10px rgba(22,163,74,.7)}}
@keyframes pulse-ring{0%,100%{box-shadow:0 0 0 3px var(--ring-color,#8a8a87),0 0 8px 1px var(--ring-color,#8a8a87)}50%{box-shadow:0 0 0 5px var(--ring-color,#8a8a87),0 0 16px 3px var(--ring-color,#8a8a87)}}
@keyframes burn-reset{0%{transform:scale(1.2);color:var(--green)}30%{transform:scale(1);color:var(--green)}100%{color:var(--text-3)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">


const {useState,useEffect,useRef,useCallback,Fragment} = React;
const BASE = 'http://localhost:4747';

const CRM_STAGES = ['identified','contacted','meeting','proposal','closed'];
const CONTENT_STATUSES = ['idea','writing','review','scheduled','published'];
const AGENTS_CFG = [
  {name:'FUNKIE',dir:'funkie',role:'Product Operator',color:'var(--funkie)'},
  {name:'LOBE',dir:'lobe',role:'Frontend Engineer',color:'var(--lobe)'},
  {name:'SEO ENGINE',dir:'seo-engine',role:'SEO Strategist',color:'var(--seo)'},
];

function priorityColor(p){return p==='P0'?'var(--red)':p==='P1'?'#ea580c':p==='P2'?'#ca8a04':'var(--text-3)';}
function priorityBg(p){return p==='P0'?'var(--red-soft)':p==='P1'?'rgba(234,88,12,0.07)':p==='P2'?'rgba(202,138,4,0.07)':'var(--bg-inset)';}
function stageColor(s){return s==='identified'?'var(--text-3)':s==='contacted'?'var(--blue)':s==='meeting'?'var(--amber)':s==='proposal'?'var(--violet)':s==='closed'?'var(--green)':'var(--text-3)';}
function stageBg(s){return s==='identified'?'var(--bg-inset)':s==='contacted'?'var(--blue-soft)':s==='meeting'?'var(--amber-soft)':s==='proposal'?'var(--violet-soft)':s==='closed'?'var(--green-soft)':'var(--bg-inset)';}
function agentColor(n){var k=(n||'').toLowerCase();return k.includes('funkie')?'var(--funkie)':k.includes('lobe')?'var(--lobe)':k.includes('seo')?'var(--seo)':'var(--text-3)';}
function agentBg(n){var k=(n||'').toLowerCase();return k.includes('funkie')?'var(--amber-soft)':k.includes('lobe')?'var(--violet-soft)':k.includes('seo')?'var(--cyan-soft)':'var(--bg-inset)';}
function csColor(s){return s==='idea'?'var(--text-3)':s==='writing'?'var(--blue)':s==='review'?'var(--amber)':s==='scheduled'?'var(--violet)':s==='published'?'var(--green)':'var(--text-3)';}
function csBg(s){return s==='idea'?'var(--bg-inset)':s==='writing'?'var(--blue-soft)':s==='review'?'var(--amber-soft)':s==='scheduled'?'var(--violet-soft)':s==='published'?'var(--green-soft)':'var(--bg-inset)';}

function relTime(d){
  if(!d) return '';
  var now=Date.now(), ms=now - new Date(d).getTime();
  if(ms<0) ms=0;
  var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60),dy=Math.floor(h/24);
  if(s<60) return 'just now';
  if(m<60) return m+'m ago';
  if(h<24) return h+'h ago';
  return dy+'d ago';
}

const card = {background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-lg)',boxShadow:'0 1px 3px rgba(0,0,0,0.04)',padding:'20px'};
const btnPrimary = {background:'var(--text-1)',color:'#fff',border:'none',borderRadius:'var(--radius)',padding:'8px 16px',fontSize:'13px',fontWeight:600,cursor:'pointer',transition:'opacity 0.15s var(--ease)'};
const btnGhost = {background:'transparent',color:'var(--text-2)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'8px 16px',fontSize:'13px',fontWeight:500,cursor:'pointer',transition:'all 0.15s var(--ease)'};
const btnDanger = {background:'var(--red-soft)',color:'var(--red)',border:'1px solid rgba(220,38,38,0.15)',borderRadius:'var(--radius)',padding:'8px 16px',fontSize:'13px',fontWeight:600,cursor:'pointer',transition:'all 0.15s var(--ease)'};
const inputStyle = {width:'100%',padding:'8px 12px',border:'1px solid var(--border)',borderRadius:'var(--radius)',fontSize:'14px',fontFamily:'var(--font-sans)',background:'var(--bg-subtle)',outline:'none',transition:'border-color 0.15s var(--ease)'};
const labelStyle = {display:'block',fontSize:'12px',fontWeight:600,color:'var(--text-2)',marginBottom:'4px',fontFamily:'var(--font-mono)',textTransform:'uppercase',letterSpacing:'0.5px'};


function Sheet({children, onClose, wide}) {
  const ref = useRef();
  useEffect(() => {
    document.body.style.overflow='hidden';
    const handler = e => { if(e.key==='Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => { document.body.style.overflow=''; window.removeEventListener('keydown', handler); };
  }, [onClose]);
  return (
    <div onClick={e=>{if(e.target===ref.current) onClose();}} ref={ref} style={{position:'fixed',inset:0,zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,0.3)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)'}}>
      <div style={{background:'var(--bg-card)',borderRadius:'20px',padding:'28px',width:wide?'860px':'520px',maxWidth:'95vw',maxHeight:'85vh',overflowY:'auto',animation:'sheet-in 0.25s var(--spring)'}}>
        {children}
      </div>
    </div>
  );
}


function ToastItem({toast, onRemove}) {
  useEffect(() => { const t=setTimeout(()=>onRemove(toast.id),3200); return ()=>clearTimeout(t); }, [toast.id, onRemove]);
  const borderColor = toast.type==='success'?'var(--green)':toast.type==='error'?'var(--red)':'var(--amber)';
  return (
    <div style={{background:'var(--text-1)',color:'#fff',padding:'12px 20px',borderRadius:'var(--radius)',fontSize:'13px',fontWeight:500,borderLeft:'3px solid '+borderColor,animation:'fade-in 0.3s var(--spring)',position:'relative',overflow:'hidden',marginBottom:'8px'}}>
      {toast.message}
      <div style={{position:'absolute',bottom:0,left:0,height:'2px',background:borderColor,animation:'toast-progress 3.2s linear'}}/>
    </div>
  );
}
function ToastContainer({toasts, removeToast}) {
  if(!toasts.length) return null;
  return (
    <div style={{position:'fixed',top:'16px',left:'50%',transform:'translateX(-50%)',zIndex:300,display:'flex',flexDirection:'column',alignItems:'center'}}>
      {toasts.map(t=><ToastItem key={t.id} toast={t} onRemove={removeToast}/>)}
    </div>
  );
}


function SectionTitle({children, style:sx}) {
  return <h2 style={{fontSize:'16px',fontWeight:700,color:'var(--text-1)',marginBottom:'16px',letterSpacing:'-0.2px',...(sx||{})}}>{children}</h2>;
}


function CommandStrip({data, connected, lastUpdate, onRefresh, activeTab, setActiveTab, projections, contentData}) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const i=setInterval(()=>setNow(Date.now()),1000); return ()=>clearInterval(i); }, []);

  const hour = new Date().getHours();
  const greeting = hour<12 ? 'Morning' : hour<17 ? 'Afternoon' : 'Evening';
  const clock = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  const secsAgo = Math.max(0, Math.floor((now - lastUpdate)/1000));

  const metrics = data?.metrics || {};
  const goals = data?.goals || {done:0,total:0};
  const published = (contentData?.items||[]).filter(i=>i.status==='published').length;
  const pipeVal = projections?.pipelineValue || 0;
  const mrr = projections?.currentMRR || 0;

  const kpis = [
    {label:'Users', value: metrics.users?.count ?? 0},
    {label:'MRR', value: '$'+(mrr||0)},
    {label:'Pipeline', value: '$'+pipeVal},
    {label:'Published', value: published},
    {label:'Goals', value: goals.done+'/'+goals.total},
  ];

  const tabs = ['overview','pipeline','content','agents','system'];

  const chipStyle = {display:'inline-flex',alignItems:'center',gap:'6px',padding:'4px 12px',background:'var(--bg-inset)',borderRadius:'20px',fontSize:'12px',fontFamily:'var(--font-mono)',color:'var(--text-2)',fontWeight:500};

  return (
    <div style={{position:'sticky',top:0,zIndex:100,background:'var(--bg-card)',borderBottom:'1px solid var(--border)',padding:'0 28px'}}>
      <div style={{maxWidth:'1320px',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:'52px'}}>
        <div style={{display:'flex',alignItems:'center',gap:'16px'}}>
          <span style={{fontWeight:700,fontSize:'15px',letterSpacing:'-0.5px'}}>FADEJUNKIE</span>
          <span style={{color:'var(--text-3)',fontSize:'13px'}}>Good {greeting}, Anthony</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
          {kpis.map(k=>(
            <div key={k.label} style={chipStyle}>
              <span style={{color:'var(--text-3)'}}>{k.label}</span>
              <span style={{color:'var(--text-1)',fontWeight:600}}>{k.value}</span>
            </div>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <div style={{width:'7px',height:'7px',borderRadius:'50%',background:connected?'var(--green)':'var(--red)',animation:connected?'glow 2s infinite':'pulse 1.5s infinite'}}/>
            <span style={{fontSize:'11px',fontFamily:'var(--font-mono)',color:'var(--text-3)'}}>{connected?'Live':'Polling'} · {secsAgo}s</span>
          </div>
          <span style={{fontSize:'12px',fontFamily:'var(--font-mono)',color:'var(--text-3)'}}>{clock}</span>
          <button onClick={onRefresh} style={{...btnGhost,padding:'4px 10px',fontSize:'12px'}} onMouseOver={e=>e.currentTarget.style.background='var(--bg-hover)'} onMouseOut={e=>e.currentTarget.style.background='transparent'}>Refresh</button>
        </div>
      </div>
      <div style={{maxWidth:'1320px',margin:'0 auto',display:'flex',gap:'4px',paddingBottom:'0'}}>
        {tabs.map(t=>(
          <button key={t} onClick={()=>setActiveTab(t)} style={{background:'none',border:'none',padding:'8px 16px',fontSize:'13px',fontWeight:activeTab===t?600:400,color:activeTab===t?'var(--text-1)':'var(--text-3)',cursor:'pointer',borderBottom:activeTab===t?'2px solid var(--text-1)':'2px solid transparent',transition:'all 0.15s var(--ease)',textTransform:'capitalize'}} onMouseOver={e=>{if(activeTab!==t) e.currentTarget.style.color='var(--text-2)';}} onMouseOut={e=>{if(activeTab!==t) e.currentTarget.style.color='var(--text-3)';}}>{t}</button>
        ))}
      </div>
    </div>
  );
}


function AlertRail({data}) {
  const alerts = [];
  const agents = data?.agents || [];
  agents.forEach(a => {
    if((a.inbox||[]).length) alerts.push({text:(a.name||a.dir)+' has '+a.inbox.length+' inbox item(s)',level:'amber'});
    if((a.pending||[]).length) alerts.push({text:(a.name||a.dir)+' has '+a.pending.length+' pending plan(s)',level:'amber'});
  });
  const auditItems = data?.audit?.items || [];
  const p0 = auditItems.filter(i=>i.priority==='P0');
  if(p0.length) alerts.push({text:p0.length+' critical (P0) audit item(s)',level:'red'});
  if(!alerts.length) return null;
  return (
    <div style={{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'20px',animation:'fade-in 0.3s var(--ease)'}}>
      {alerts.map((a,i)=>(
        <span key={i} style={{display:'inline-flex',alignItems:'center',padding:'6px 14px',borderRadius:'20px',fontSize:'12px',fontWeight:500,background:a.level==='red'?'var(--red-soft)':'var(--amber-soft)',color:a.level==='red'?'var(--red)':'var(--amber)',fontFamily:'var(--font-mono)'}}>{a.text}</span>
      ))}
    </div>
  );
}


function GitCard({data, health, openSheet}) {
  const git = data?.git || {};
  const commits = (git.recentCommits || []).slice(0,6);
  const checks = health || [];
  return (
    <div style={{...card}}>
      <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'16px'}}>
        <span style={{fontWeight:700,fontSize:'14px'}}>Git Status</span>
        {git.branch && <span style={{padding:'2px 10px',borderRadius:'20px',background:'var(--violet-soft)',color:'var(--violet)',fontSize:'11px',fontFamily:'var(--font-mono)',fontWeight:600}}>{git.branch}</span>}
        {git.dirty>0 && <span style={{fontSize:'12px',color:'var(--amber)',fontFamily:'var(--font-mono)'}}>{git.dirty} dirty</span>}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'16px'}}>
        {commits.length===0 && <span style={{fontStyle:'italic',color:'var(--text-3)',fontSize:'13px'}}>No recent commits</span>}
        {commits.map((c,i)=>(
          <div key={i} style={{display:'flex',alignItems:'baseline',gap:'8px',fontSize:'13px'}}>
            <span onClick={()=>openSheet({type:'diff',hash:c.hash})} style={{fontFamily:'var(--font-mono)',color:'var(--violet)',cursor:'pointer',borderBottom:'1px dashed var(--violet)',fontSize:'12px'}}>{(c.hash||'').slice(0,7)}</span>
            <span style={{color:'var(--text-2)',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',cursor:'pointer'}} title={'Click to copy: git show '+(c.hash||'')} onClick={()=>{navigator.clipboard.writeText('git show '+c.hash);}}>{c.message}</span>
          </div>
        ))}
      </div>
      {checks.length>0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:'10px',paddingTop:'12px',borderTop:'1px solid var(--border)'}}>
          {checks.map((ch,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'12px',color:'var(--text-2)'}}>
              <div style={{width:'7px',height:'7px',borderRadius:'50%',background:ch.ok||ch.status==='ok'?'var(--green)':ch.status==='warn'?'var(--amber)':'var(--red)'}}/>
              <span>{ch.name||ch.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


function GoalsSummaryCard({data}) {
  const goals = data?.goals || {done:0,total:16,arms:[]};
  const pct = goals.total>0 ? Math.round((goals.done/goals.total)*100) : 0;
  const arms = goals.arms || goals.categories || [];
  return (
    <div style={{...card}}>
      <div style={{fontWeight:700,fontSize:'14px',marginBottom:'16px'}}>Q1 Goals</div>
      <div style={{display:'flex',alignItems:'baseline',gap:'8px',marginBottom:'12px'}}>
        <span style={{fontSize:'36px',fontWeight:700,fontFamily:'var(--font-mono)',letterSpacing:'-2px'}}>{goals.done}</span>
        <span style={{fontSize:'14px',color:'var(--text-3)'}}>/ {goals.total}</span>
      </div>
      <div style={{height:'6px',background:'var(--bg-inset)',borderRadius:'3px',marginBottom:'16px',overflow:'hidden'}}>
        <div style={{height:'100%',width:pct+'%',background:'var(--green)',borderRadius:'3px',transition:'width 0.4s var(--ease)'}}/>
      </div>
      {pct===0 && <p style={{fontSize:'13px',color:'var(--text-3)',fontStyle:'italic',marginBottom:'12px'}}>All goals open — pick one and move.</p>}
      {arms.map((arm,i)=>{
        const aPct = arm.total>0?Math.round((arm.done/arm.total)*100):0;
        return (
          <div key={i} style={{marginBottom:'8px'}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',marginBottom:'3px'}}>
              <span style={{color:'var(--text-2)',fontWeight:500}}>{arm.name||arm.label}</span>
              <span style={{fontFamily:'var(--font-mono)',color:'var(--text-3)'}}>{arm.done}/{arm.total}</span>
            </div>
            <div style={{height:'4px',background:'var(--bg-inset)',borderRadius:'2px',overflow:'hidden'}}>
              <div style={{height:'100%',width:aPct+'%',background:'var(--text-2)',borderRadius:'2px',transition:'width 0.4s var(--ease)'}}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}


function MetricsCard({data, addToast}) {
  const metrics = data?.metrics || {};
  const [editing, setEditing] = useState(null);
  const [editVal, setEditVal] = useState('');
  const [editNote, setEditNote] = useState('');

  const keys = Object.keys(metrics).filter(k=>typeof metrics[k]==='object');

  function startEdit(k) {
    setEditing(k);
    setEditVal(String(metrics[k]?.count ?? metrics[k]?.value ?? 0));
    setEditNote('');
  }

  function saveMetric() {
    if(!editing) return;
    fetch(BASE+'/api/metrics',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:editing,count:Number(editVal),note:editNote||undefined})})
      .then(r=>r.json()).then(()=>{addToast('Metric updated','success');setEditing(null);})
      .catch(()=>addToast('Failed to save','error'));
  }

  if(!keys.length) return <div style={card}><span style={{fontStyle:'italic',color:'var(--text-3)'}}>No metrics available</span></div>;

  return (
    <div style={{...card}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:'12px'}}>
        {keys.map(k=>{
          const m = metrics[k];
          const val = m?.count ?? m?.value ?? 0;
          const target = m?.target;
          const updated = m?.updatedAt || m?.lastUpdated;
          const isEd = editing===k;
          return (
            <div key={k} onClick={()=>{if(!isEd)startEdit(k);}} style={{padding:'14px',borderRadius:'var(--radius)',border:'1px solid var(--border)',cursor:'pointer',transition:'all 0.15s var(--ease)',background:isEd?'var(--bg-subtle)':'transparent'}} onMouseOver={e=>{if(!isEd)e.currentTarget.style.background='var(--bg-hover)';}} onMouseOut={e=>{if(!isEd)e.currentTarget.style.background='transparent';}}>
              <div style={{fontSize:'11px',fontFamily:'var(--font-mono)',color:'var(--text-3)',textTransform:'uppercase',marginBottom:'6px',letterSpacing:'0.5px'}}>{k}</div>
              {isEd ? (
                <div onClick={e=>e.stopPropagation()}>
                  <input type="number" value={editVal} onChange={e=>setEditVal(e.target.value)} style={{...inputStyle,marginBottom:'6px',padding:'6px 10px',fontSize:'18px',fontWeight:700,fontFamily:'var(--font-mono)',width:'100%'}} autoFocus/>
                  <input type="text" value={editNote} onChange={e=>setEditNote(e.target.value)} placeholder="Note (optional)" style={{...inputStyle,padding:'4px 8px',fontSize:'12px',marginBottom:'8px'}}/>
                  <div style={{display:'flex',gap:'6px'}}>
                    <button onClick={saveMetric} style={{...btnPrimary,padding:'4px 12px',fontSize:'12px'}}>Save</button>
                    <button onClick={()=>setEditing(null)} style={{...btnGhost,padding:'4px 12px',fontSize:'12px'}}>Cancel</button>
                  </div>
                </div>
              ) : (
                <div>
                  <span style={{fontSize:'22px',fontWeight:700,fontFamily:'var(--font-mono)'}}>{val}</span>
                  {target!=null && <span style={{fontSize:'12px',color:'var(--text-3)',marginLeft:'4px'}}>/ {target}</span>}
                  {updated && <div style={{fontSize:'11px',color:'var(--text-3)',marginTop:'4px',fontFamily:'var(--font-mono)'}}>{relTime(updated)}</div>}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}


function InsightsPanel({data}) {
  const insights = data?.insights || {};
  const score = insights.score ?? 0;
  const items = insights.items || [];
  const highlights = insights.highlights || [];

  const r = 26;
  const circ = 2 * Math.PI * r;
  const offset = circ - (circ * Math.min(score,100) / 100);
  const scoreMsg = score>=80?'Strong position':score>=50?'Making progress':'Needs attention';

  const now = new Date();
  const q1End = new Date(now.getFullYear(),2,31);
  const daysLeft = Math.max(0, Math.ceil((q1End-now)/(1000*60*60*24)));

  const typeColor = t => t==='critical'?'var(--red)':t==='action'?'var(--amber)':t==='warning'?'#ca8a04':'var(--blue)';

  return (
    <div style={{...card}}>
      <div style={{display:'flex',alignItems:'center',gap:'20px',marginBottom:'20px'}}>
        <div style={{position:'relative',width:'68px',height:'68px'}}>
          <svg width="68" height="68" viewBox="0 0 68 68">
            <circle cx="34" cy="34" r={r} fill="none" stroke="var(--bg-inset)" strokeWidth="5"/>
            <circle cx="34" cy="34" r={r} fill="none" stroke={score>=60?'var(--green)':score>=30?'var(--amber)':'var(--red)'} strokeWidth="5" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" transform="rotate(-90 34 34)" style={{transition:'stroke-dashoffset 0.6s var(--ease)'}}/>

  const total = stages.reduce(function(s,x){return s+x.count;},0) || 1;

  const stats = [
    {label:'Current MRR',value:'$'+(p.currentMRR||0)},
    {label:'Projected MRR',value:'$'+(p.projectedMRR||0)},
    {label:'Pipeline Value',value:'$'+(p.pipelineValue||0)},

  return (
    <div style={{...card,marginBottom:'24px'}}>
      <div style={{display:'flex',alignItems:'center',gap:'0',marginBottom:'20px'}}>
        {stats.map(function(s,i){
          return (
            <div key={i} style={{flex:1,textAlign:'center',padding:'0 12px',borderRight:i<stats.length-1?'1px solid var(--border)':'none'}}>
              <div style={{fontSize:'11px',fontFamily:'var(--font-mono)',color:'var(--text-3)',textTransform:'uppercase',marginBottom:'4px',letterSpacing:'0.5px'}}>{s.label}</div>
              <div style={{fontSize:'20px',fontWeight:700,fontFamily:'var(--font-mono)'}}>{s.value}</div>

        })}
      </div>

        <div>
          <div style={{display:'flex',height:'10px',borderRadius:'5px',overflow:'hidden',marginBottom:'10px'}}>
            {stages.map(function(s,i){
              return <div key={i} style={{width:(s.count/total*100)+'%',background:stageColor(s.stage),transition:'width 0.4s var(--ease)'}}/>;
            })}
          </div>
          <div style={{display:'flex',gap:'14px',flexWrap:'wrap'}}>
            {stages.map(function(s,i){

                <div key={i} style={{display:'flex',alignItems:'center',gap:'5px',fontSize:'12px'}}>
                  <div style={{width:'8px',height:'8px',borderRadius:'2px',background:stageColor(s.stage)}}/>

    </div>
  );
}

function agentMood(agent) {
  var inbox = (agent.inbox||[]).length;
  var doneCount = agent.doneCount || 0;
  var lastDone = agent.lastDoneTime ? Date.now() - new Date(agent.lastDoneTime).getTime() : Infinity;
  var mins = lastDone / 60000;
  // Shipping: completed something in last 30min and inbox is manageable
  if(mins < 30 && inbox <= 1) return {emoji:'\u{1F680}',label:'Shipping'};
  // Backlogged: 3+ inbox items piling up
  if(inbox >= 3) return {emoji:'\u{23F3}',label:'Backlogged'};
  // Active: has inbox work or recent output
  if(inbox > 0 || mins < 60) return {emoji:'\u{26A1}',label:'Active'};
  // Idle: nothing happening for a while
  if(doneCount > 0) return {emoji:'\u{1F319}',label:'Idle'};
  // Cold: never produced output
  return {emoji:'\u{1F9CA}',label:'Cold'};
}

function BurnClock({lastDoneTime, color}) {
  var [elapsed, setElapsed] = useState('--:--');
  var [prevTime, setPrevTime] = useState(lastDoneTime);
  var [justReset, setJustReset] = useState(false);

  useEffect(function(){
    if(prevTime && lastDoneTime && lastDoneTime !== prevTime) {
      setJustReset(true);
      var t = setTimeout(function(){setJustReset(false);}, 1500);
      return function(){clearTimeout(t);};
    }
  }, [lastDoneTime]);

  useEffect(function(){setPrevTime(lastDoneTime);}, [lastDoneTime]);

  useEffect(function(){
    function tick(){
      if(!lastDoneTime){setElapsed('--:--');return;}
      var ms = Math.max(0, Date.now() - new Date(lastDoneTime).getTime());
      var s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60);
      if(h > 0) setElapsed(h+'h '+String(m%60).padStart(2,'0')+'m');
      else setElapsed(String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0'));
    }
    tick();
    var i = setInterval(tick, 1000);
    return function(){clearInterval(i);};
  }, [lastDoneTime]);

  var warmth = 'var(--text-3)';
  if(lastDoneTime) {
    var mins = (Date.now() - new Date(lastDoneTime).getTime()) / 60000;
    if(mins > 120) warmth = 'var(--red)';
    else if(mins > 60) warmth = 'var(--amber)';
  }

  return React.createElement('span', {
    title: 'Time since last completed task',
    style: {
      fontSize:'11px', fontFamily:'var(--font-mono)', fontWeight:600,
      color: justReset ? 'var(--green)' : warmth,
      transform: justReset ? 'scale(1.15)' : 'scale(1)',
      transition: 'all 0.4s var(--ease)',
      display:'inline-block'
    }
  }, elapsed);
}

function EnvVarsPanel({envvars}) {
  const [revealed, setRevealed] = useState({});
  const [revealedValues, setRevealedValues] = useState({});
  const [countdowns, setCountdowns] = useState({});
  const timers = useRef({});
  const countdownTimers = useRef({});

  function reveal(v){
    var key = v.key || v.label || v.name;
    if (!v.sensitive) {
      setRevealed(function(prev){var n={...prev};n[key]=true;return n;});
      return;
    }
    fetch(BASE+'/api/reveal?key='+encodeURIComponent(key))
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.ok && d.value){
          setRevealedValues(function(prev){var n={...prev};n[key]=d.value;return n;});
          setRevealed(function(prev){var n={...prev};n[key]=true;return n;});
          var count = 8;
          setCountdowns(function(prev){var n={...prev};n[key]=count;return n;});
          if(countdownTimers.current[key]) clearInterval(countdownTimers.current[key]);
          countdownTimers.current[key] = setInterval(function(){
            count--;
            setCountdowns(function(prev){var n={...prev};n[key]=count;return n;});
            if(count<=0){
              clearInterval(countdownTimers.current[key]);
              delete countdownTimers.current[key];
              setRevealed(function(prev){var n={...prev};n[key]=false;return n;});
              setRevealedValues(function(prev){var n={...prev};delete n[key];return n;});
              setCountdowns(function(prev){var n={...prev};delete n[key];return n;});
            }
          }, 1000);
        }
      })
      .catch(function(){});
  }

  function hide(key){
    setRevealed(function(prev){var n={...prev};n[key]=false;return n;});
    setRevealedValues(function(prev){var n={...prev};delete n[key];return n;});
    if(countdownTimers.current[key]){clearInterval(countdownTimers.current[key]);delete countdownTimers.current[key];}
    setCountdowns(function(prev){var n={...prev};delete n[key];return n;});
  }

  useEffect(function(){
    return function(){
      Object.values(timers.current).forEach(function(t){clearTimeout(t);});
      Object.values(countdownTimers.current).forEach(function(t){clearInterval(t);});
    };
  },[]);

  var vars = envvars || [];
  if(!vars.length) return <div style={card}><p style={{fontStyle:'italic',color:'var(--text-3)',fontSize:'13px'}}>No environment variables</p></div>;

  var groups = {};
  vars.forEach(function(v){
    var cat = v.cat || v.category || v.group || 'General';
    if(!groups[cat]) groups[cat]=[];
    groups[cat].push(v);
  });

  return (
    <div style={card}>
      {Object.entries(groups).map(function(entry){
        var cat=entry[0], items=entry[1];
        return (
          <div key={cat} style={{marginBottom:'16px'}}>
            <div style={{fontSize:'11px',fontWeight:600,color:'var(--text-3)',fontFamily:'var(--font-mono)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>{cat}</div>
            {items.map(function(v,i){
              var key = v.key || v.label || v.name;
              var isRevealed = revealed[key];
              var displayVal = isRevealed ? (revealedValues[key] || v.value || v.masked || '(empty)') : (v.masked || '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022');
              return (
                <div key={i} style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderBottom:i<items.length-1?'1px solid var(--border)':'none',fontSize:'13px'}}>
                  <span style={{minWidth:'140px',fontWeight:500}}>{v.label||v.key||v.name}</span>
                  <span style={{flex:1,fontFamily:'var(--font-mono)',fontSize:'12px',color:isRevealed?'var(--text-1)':'var(--text-3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{displayVal}</span>
                  {v.sensitive && (
                    <div style={{display:'flex',alignItems:'center',gap:'6px',flexShrink:0}}>
                      {countdowns[key]!=null && <span style={{fontSize:'11px',fontFamily:'var(--font-mono)',color:'var(--red)',fontWeight:600}}>{countdowns[key]}</span>}
                      <button onClick={function(e){e.stopPropagation();isRevealed?hide(key):reveal(v);}} style={{...btnGhost,padding:'3px 10px',fontSize:'11px'}} onMouseOver={function(e){e.currentTarget.style.background='var(--bg-hover)';}} onMouseOut={function(e){e.currentTarget.style.background='transparent';}}>{isRevealed?'Hide':'Reveal'}</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}


function ResourcesHub({resources}) {
  var cats = resources || [];
  if(!cats.length) return <div style={card}><p style={{fontStyle:'italic',color:'var(--text-3)',fontSize:'13px'}}>No resources available</p></div>;
  return (
    <div style={card}>
      {cats.map(function(c,i){
        var links = c.links || [];
        return (
          <div key={i} style={{marginBottom:'14px'}}>
            <div style={{fontSize:'11px',fontWeight:600,color:'var(--text-3)',fontFamily:'var(--font-mono)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'6px'}}>{c.cat||c.category||c.name}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
              {links.map(function(l,j){
                return <a key={j} href={l.url} target="_blank" rel="noopener" style={{display:'inline-flex',alignItems:'center',gap:'4px',padding:'4px 12px',borderRadius:'20px',background:'var(--bg-inset)',color:'var(--text-2)',fontSize:'12px',textDecoration:'none',transition:'all 0.15s var(--ease)',border:'1px solid transparent'}} onMouseOver={function(e){e.currentTarget.style.background='var(--bg-hover)';e.currentTarget.style.borderColor='var(--border)';}} onMouseOut={function(e){e.currentTarget.style.background='var(--bg-inset)';e.currentTarget.style.borderColor='transparent';}}>{l.icon && <span>{l.icon}</span>}{l.label||l.name}</a>;
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}


function DiffSheet({hash, onClose}) {
  const [diff, setDiff] = useState('');
  const [loading, setLoading] = useState(true);
  useEffect(function(){
    fetch(BASE+'/api/git-diff?hash='+encodeURIComponent(hash))
      .then(function(r){return r.text();}).then(function(t){setDiff(t);setLoading(false);})
      .catch(function(){setDiff('Failed to load diff');setLoading(false);});
  },[hash]);

  function renderDiff(text){
    return text.split('\n').map(function(line,i){
      var bg = 'transparent';
      var color = 'var(--text-1)';
      if(line.startsWith('+') && !line.startsWith('+++')) { bg='var(--green-soft)'; color='var(--green)'; }
      else if(line.startsWith('-') && !line.startsWith('---')) { bg='var(--red-soft)'; color='var(--red)'; }
      else if(line.startsWith('@@')) { bg='var(--amber-soft)'; color='var(--amber)'; }
      return <div key={i} style={{background:bg,color:color,padding:'1px 8px',fontFamily:'var(--font-mono)',fontSize:'12px',lineHeight:1.6,whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{line}</div>;
    });
  }

  return (
    <Sheet onClose={onClose} wide>
      <h3 style={{fontSize:'18px',fontWeight:700,marginBottom:'16px'}}>Diff: <span style={{fontFamily:'var(--font-mono)',color:'var(--violet)'}}>{(hash||'').slice(0,7)}</span></h3>
      {loading ? (
        <div style={{textAlign:'center',padding:'40px',color:'var(--text-3)'}}>
          <div style={{width:'20px',height:'20px',border:'2px solid var(--border)',borderTopColor:'var(--text-1)',borderRadius:'50%',animation:'spin 0.6s linear infinite',margin:'0 auto 8px'}}/>
          Loading...
        </div>
      ) : (
        <div style={{borderRadius:'var(--radius)',overflow:'hidden',border:'1px solid var(--border)',maxHeight:'60vh',overflowY:'auto'}}>{renderDiff(diff)}</div>
      )}
      <div style={{display:'flex',justifyContent:'flex-end',marginTop:'16px'}}>
        <button onClick={onClose} style={btnGhost} onMouseOver={function(e){e.currentTarget.style.background='var(--bg-hover)';}} onMouseOut={function(e){e.currentTarget.style.background='transparent';}}>Close</button>
      </div>
    </Sheet>
  );
}


function OverviewTab({data, health, openSheet, addToast}) {
  return (
    <div>
      <SectionTitle>System Health</SectionTitle>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:'20px',marginBottom:'32px'}}>
        <GitCard data={data} health={health} openSheet={openSheet}/>
        <GoalsSummaryCard data={data}/>
      </div>
      <SectionTitle>Business Metrics</SectionTitle>
      <MetricsCard data={data} addToast={addToast}/>
      <div style={{marginTop:'32px'}}>
        <SectionTitle>Business Intelligence</SectionTitle>
        <InsightsPanel data={data}/>
      </div>
      <div style={{marginTop:'32px'}}>
        <SectionTitle>Recent Activity</SectionTitle>
        <ActivityPanel data={data}/>
      </div>
    </div>
  );
}

function PipelineTab({projections, crmData, openSheet, addToast}) {
  return (
    <div>
      <SectionTitle>Revenue Projections</SectionTitle>
      <ProjectionsBar projections={projections}/>
      <SectionTitle style={{marginTop:32}}>Prospects</SectionTitle>
      <CRMPanel crmData={crmData} openSheet={openSheet}/>
      <div style={{display:'flex',justifyContent:'flex-end'}}>
        <button onClick={function(){openSheet({type:'addProspect'});}} style={btnPrimary} onMouseOver={function(e){e.currentTarget.style.opacity='0.85';}} onMouseOut={function(e){e.currentTarget.style.opacity='1';}}>+ Add Prospect</button>
      </div>
    </div>
  );
}

function ContentTab({contentData, notesData, openSheet, fetchContent, fetchNotes, addToast}) {
  return (
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:'24px'}}>
      <div>
        <SectionTitle>Content Calendar</SectionTitle>
        <ContentCalendarPanel contentData={contentData} openSheet={openSheet} fetchContent={fetchContent} addToast={addToast}/>
      </div>
      <div>
        <SectionTitle>Scratch Pad</SectionTitle>
        <NotesPanel notesData={notesData} fetchNotes={fetchNotes} addToast={addToast}/>
      </div>
    </div>
  );
}

function AgentsTab({agents, openSheet, historyData}) {
  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3, 1fr)',gap:'20px',marginBottom:'32px'}}>
        {agents.map(function(ag){return <AgentCard key={ag.name} agent={ag} openSheet={openSheet}/>;})}
      </div>
      <SectionTitle>Task History</SectionTitle>
      <TaskHistoryPanel historyData={historyData}/>
    </div>
  );
}

function SystemTab({data, envvars, resources}) {
  return (
    <div>
      <SectionTitle>Platform Audit</SectionTitle>
      <AuditPanel data={data}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'24px',marginTop:'32px'}}>
        <div>
          <SectionTitle>API Keys &amp; Config</SectionTitle>
          <EnvVarsPanel envvars={envvars}/>
        </div>
        <div>
          <SectionTitle>Resources Hub</SectionTitle>
          <ResourcesHub resources={resources}/>
        </div>
      </div>
    </div>
  );
}


function App() {
  const [data, setData] = useState(null);
  const [health, setHealth] = useState([]);
  const [crmData, setCrmData] = useState({prospects:[]});
  const [contentData, setContentData] = useState({items:[]});
  const [notesData, setNotesData] = useState({notes:[]});
  const [historyData, setHistoryData] = useState({history:[]});
  const [resources, setResources] = useState([]);
  const [envvars, setEnvvars] = useState([]);
  const [projections, setProjections] = useState({});
  const [connected, setConnected] = useState(false);
  const [lastUpdate, setLastUpdate] = useState(Date.now());
  const [toasts, setToasts] = useState([]);
  const [sheet, setSheet] = useState(null);
  const [activeTab, setActiveTab] = useState('overview');

  const addToast = useCallback(function(message, type){
    var id = Date.now()+Math.random();
    setToasts(function(prev){return prev.concat({id:id,message:message,type:type||'success'});});
  },[]);
  const removeToast = useCallback(function(id){
    setToasts(function(prev){return prev.filter(function(t){return t.id!==id;});});
  },[]);

  function openSheet(cfg){ setSheet(cfg); }
  function closeSheet(){ setSheet(null); }

  function fetchCrm(){
    fetch(BASE+'/api/crm').then(function(r){return r.json();}).then(setCrmData).catch(function(){});
  }
  function fetchContent(){
    fetch(BASE+'/api/content').then(function(r){return r.json();}).then(setContentData).catch(function(){});
  }
  function fetchNotes(){
    fetch(BASE+'/api/notes').then(function(r){return r.json();}).then(setNotesData).catch(function(){});
  }

  var fetchAll = useCallback(function(){
    Promise.all([
      fetch(BASE+'/api/status').then(function(r){return r.json();}).then(function(d){setData(d);setLastUpdate(Date.now());}).catch(function(){}),
      fetch(BASE+'/api/health').then(function(r){return r.json();}).then(function(d){setHealth(d.services||[]);}).catch(function(){}),
      fetch(BASE+'/api/crm').then(function(r){return r.json();}).then(setCrmData).catch(function(){}),
      fetch(BASE+'/api/content').then(function(r){return r.json();}).then(setContentData).catch(function(){}),
      fetch(BASE+'/api/notes').then(function(r){return r.json();}).then(setNotesData).catch(function(){}),
      fetch(BASE+'/api/task-history').then(function(r){return r.json();}).then(setHistoryData).catch(function(){}),
      fetch(BASE+'/api/envvars').then(function(r){return r.json();}).then(function(d){setEnvvars(d.vars||[]);}).catch(function(){}),
      fetch(BASE+'/api/projections').then(function(r){return r.json();}).then(setProjections).catch(function(){}),
      fetch(BASE+'/api/resources').then(function(r){return r.json();}).then(function(d){setResources(d.categories||[]);}).catch(function(){})
    ]);
  },[]);

  useEffect(function(){
    fetchAll();
    var interval = setInterval(fetchAll, 30000);
    return function(){clearInterval(interval);};
  },[fetchAll]);

  useEffect(function(){
    var es;
    try {
      es = new EventSource(BASE+'/sse');
      es.onopen = function(){setConnected(true);};
      es.onmessage = function(e){
        try{
          var d = JSON.parse(e.data);
          if(d) { setData(d); setLastUpdate(Date.now()); }
        }catch(err){}
      };
      es.onerror = function(){setConnected(false);};
    } catch(err){ setConnected(false); }
    return function(){if(es) es.close();};
  },[]);

  var agents = AGENTS_CFG.map(function(cfg){
    var live = (data?.agents || []).find(function(a){
      return ((a.name||'').toLowerCase().includes(cfg.dir)) || ((a.dir||'')===cfg.dir);
    });
    return Object.assign({},cfg,live||{},{name:cfg.name,role:cfg.role,color:cfg.color});
  });

  if(!data) {
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:'16px'}}>
        <div style={{width:'28px',height:'28px',border:'3px solid var(--border)',borderTopColor:'var(--text-1)',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
        <span style={{color:'var(--text-3)',fontSize:'14px'}}>Connecting to Control Center...</span>
      </div>
    );
  }

  return (
    <Fragment>
      <CommandStrip data={data} connected={connected} lastUpdate={lastUpdate} onRefresh={fetchAll} activeTab={activeTab} setActiveTab={setActiveTab} projections={projections} contentData={contentData}/>
      <div style={{maxWidth:'1320px',margin:'0 auto',padding:'24px 28px 80px'}}>
        <AlertRail data={data}/>
        {activeTab==='overview' && <OverviewTab data={data} health={health} openSheet={openSheet} addToast={addToast}/>}
        {activeTab==='pipeline' && <PipelineTab projections={projections} crmData={crmData} openSheet={openSheet} addToast={addToast}/>}
        {activeTab==='content' && <ContentTab contentData={contentData} notesData={notesData} openSheet={openSheet} fetchContent={fetchContent} fetchNotes={fetchNotes} addToast={addToast}/>}
        {activeTab==='agents' && <AgentsTab agents={agents} openSheet={openSheet} historyData={historyData}/>}
        {activeTab==='system' && <SystemTab data={data} envvars={envvars} resources={resources}/>}
      </div>
      {sheet && sheet.type==='task' && <TaskComposerSheet agent={sheet.agent} onClose={closeSheet} addToast={addToast}/>}
      {sheet && sheet.type==='plan' && <PlanViewerSheet agent={sheet.agent} file={sheet.file} onClose={closeSheet}/>}
      {sheet && sheet.type==='approve' && <ApproveModal agent={sheet.agent} file={sheet.file} onClose={closeSheet} addToast={addToast} onDone={fetchAll}/>}
      {sheet && sheet.type==='reject' && <RejectModal agent={sheet.agent} file={sheet.file} onClose={closeSheet} addToast={addToast} onDone={fetchAll}/>}
      {sheet && sheet.type==='diff' && <DiffSheet hash={sheet.hash} onClose={closeSheet}/>}
      {sheet && sheet.type==='prospect' && <ProspectSheet prospect={sheet.prospect} onClose={closeSheet} onSave={fetchCrm} addToast={addToast}/>}
      {sheet && sheet.type==='addProspect' && <AddProspectSheet onClose={closeSheet} onSave={fetchCrm} addToast={addToast}/>}
      {sheet && sheet.type==='editContent' && <ContentSheet item={sheet.item} onClose={closeSheet} onSave={fetchContent} addToast={addToast}/>}
      {sheet && sheet.type==='addContent' && <AddContentSheet defaultStatus={sheet.defaultStatus} onClose={closeSheet} onSave={fetchContent} addToast={addToast}/>}
      <ToastContainer toasts={toasts} removeToast={removeToast}/>
    </Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
</body>
</html>
